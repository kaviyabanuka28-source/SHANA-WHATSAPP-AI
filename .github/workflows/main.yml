name: Deploy My Bot
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # මෙතැනින් තමයි ඔබ Firebase හෝ වෙනත් Server එකකට Deploy කරන්නේ
