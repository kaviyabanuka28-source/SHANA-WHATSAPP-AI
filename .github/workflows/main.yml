name: SHANA ai

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Latest Chrome (For Puppeteer)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          npm install

      - name: Start SHANA AI Bot and Show QR
        run: |
          if [ -f "index.js" ]; then
            node index.js &
          elif [ -f "server.js" ]; then
            node server.js &
          elif [ -f "app.js" ]; then
            node app.js &
          elif [ -f "main.js" ]; then
            node main.js &
          else
            echo "❌ ප්‍රධාන ජාවාස්ක්‍රිප්ට් ෆයිල් එක හොයාගන්න බැහැ! npm start හරහා උත්සාහ කරයි..."
            npm start &
          fi
          
          echo "⏳ බොට් ක්‍රියාත්මක වෙමින් පවතී... තත්පර 25කින් QR කේතය දිස්වну ඇත..."
          echo "⚠️ QR එක ස්කෑන් කිරීමට ඔබට විනාඩි 5ක කාලයක් ලැබේ!"
          sleep 300
          echo "✅ ක්‍රියාවලිය අවසන් විය."
