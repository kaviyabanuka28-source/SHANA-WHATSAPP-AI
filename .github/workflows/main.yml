name: SHANA ai

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Latest Chrome (For Puppeteer)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          npm install

      - name: Find and Start Bot
        run: |
          # දැනට repository එක ඇතුලේ තියෙන ප්‍රධානම JS ෆයිල් එකක් හොයාගන්නවා (node_modules හැර)
          TARGET_FILE=$(find . -maxdepth 2 -name "*.js" ! -path "*/node_modules/*" | head -n 1)
          
          if [ -n "$TARGET_FILE" ]; then
            echo "🎯 සොයාගත් ෆයිල් එක ධාවනය වේ: $TARGET_FILE"
            node "$TARGET_FILE" &
          else
            echo "❌ කිසිදු .js ෆයිල් එකක් සොයාගත නොහැකි විය!"
            exit 1
          fi
          
          echo "⏳ බොට් ක්‍රියාත්මක වෙමින් පවතී... තත්පර 25කින් QR කේතය දිස්වනු ඇත..."
          echo "⚠️ QR එක ස්කෑන් කිරීමට ඔබට විනාඩි 5ක කාලයක් ලැබේ!"
          sleep 300
          echo "✅ ක්‍රියාවලිය අවසන් විය."
